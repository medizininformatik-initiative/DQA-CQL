services:
  data-server:
    image: "samply/blaze:1.6.1@sha256:fd002226eb99437b3848133cae2f421622a2650e3a14c0c97418b7b75c005705"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx4g"
      EXTERN_TERMINOLOGY_SERVICE_URL: "http://terminology-server:8080/fhir"
      LOG_LEVEL: "debug"
    ports:
    - "8080:8080"
    volumes:
    - "blaze-data:/app/data"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Please uncomment the SNOMED CT lines if you have the release files.
  # Otherwise all SNOMED CT concepts will be flagged as non-matching.
  terminology-server:
    image: "samply/blaze:1.6.1@sha256:fd002226eb99437b3848133cae2f421622a2650e3a14c0c97418b7b75c005705"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx4g"
      ENABLE_TERMINOLOGY_SERVICE: "true"
      ENABLE_TERMINOLOGY_LOINC: "true"
      LOG_LEVEL: "debug"
    ports:
    - "8082:8080"
    volumes:
    - "blaze-terminology-data:/app/data"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  blaze-data:
  blaze-terminology-data:
