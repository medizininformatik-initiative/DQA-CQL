library: scripts/Patient.cql
group: 
- type: Patient
  code: Patient
  population:
  - expression: InInitialPopulation
  stratifier:

  # Completeness
  - code: "Missing values Patient.id"
    expression: "Missing values Patient.id"
  
  - code: "Missing values Patient.meta.profile"
    expression: "Missing values Patient.meta.profile"

  - code: "Missing values Patient.identifier"
    expression: "Missing values Patient.identifier"

  - code: "Missing values Patient.active"
    expression: "Missing values Patient.active"

  - code: "Missing values Patient.gender"
    expression: "Missing values Patient.gender"

  - code: "Missing values Patient.birthDate"
    expression: "Missing values Patient.birthDate"

  - code: "Missing values Patient.address.type"
    expression: "Missing values Patient.address.type"

  - code: "Missing values Patient.address.postalCode"
    expression: "Missing values Patient.address.postalCode"

  - code: "Missing values Patient.address.country"
    expression: "Missing values Patient.address.country"



# Consistency
  - code: "Inadmissible categorical values Patient.gender"
    expression: "Inadmissible categorical values Patient.gender"

  - code: "Inadmissible categorical values Patient.address.country"
    expression: "Inadmissible categorical values Patient.address.country"


